spring:
  application:
    name: api-server
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:mariadb://localhost:3306/fsm_command}
    username: ${SPRING_R2DBC_USERNAME:fsm}
    password: ${SPRING_R2DBC_PASSWORD:fsm}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2s
  codec:
    # JSON 본문 등 in-memory buffer 한도. 1MB 초과 응답/요청 본문은 거부.
    max-in-memory-size: 1MB
  webflux:
    multipart:
      # multipart 한 파트의 in-memory 한도 (작은 텍스트 part)
      max-in-memory-size: 1MB
      # 파일 part 의 디스크 사용 한도 (10MB). 거대 업로드 차단.
      max-disk-usage-per-part: 10MB
      # 한 요청에 허용되는 part 개수
      max-parts: 20
management:
  endpoints:
    web:
      exposure:
        include: health,info
security:
  jwt:
    issuer: ${SECURITY_JWT_ISSUER:dev.riss.fsm}
    secret: ${SECURITY_JWT_SECRET}
    access-token-ttl-seconds: ${SECURITY_JWT_ACCESS_TOKEN_TTL:3600}
server:
  port: ${SERVER_PORT:8080}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
