name: fsm-local-mariadb

services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: fsm_command
      MARIADB_USER: fsm
      MARIADB_PASSWORD: fsm
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro

  # refresh token 폐기 / 향후 rate-limit 분산화 / WebSocket pub-sub / 분산 락 등에 사용.
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

volumes:
  mariadb-data:
    name: backend_mariadb-data
    external: true
  redis-data:
    name: backend_redis-data
