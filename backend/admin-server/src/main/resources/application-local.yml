spring:
  config:
    activate:
      on-profile: local
  r2dbc:
    url: r2dbc:mariadb://localhost:13306/fsm_command
    username: fsm
    password: fsm
security:
  jwt:
    secret: local-dev-secret-key-minimum-32-chars
fsm:
  storage:
    local-root: ${user.dir}/../local-storage
management:
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
