name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Yarn build + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack and pin Yarn 4.5.0
        run: |
          corepack enable
          corepack prepare yarn@4.5.0 --activate
          yarn --version

      - name: Cache Yarn Berry
        uses: actions/cache@v4
        with:
          path: |
            frontend/.yarn/cache
            frontend/.yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check (all workspaces)
        run: yarn type-check

      - name: Test main-site
        run: yarn workspace @fsm/main-site test

      - name: Test admin-site
        run: yarn workspace @fsm/admin-site test

      - name: Build main-site
        run: yarn workspace @fsm/main-site build

      - name: Build admin-site
        run: yarn workspace @fsm/admin-site build
